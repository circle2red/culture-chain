openapi: 3.1.0

info:
  title: CultureChain API
  version: 1.0.0
  description: |
    Web3 文化作品交易平台后端 API。

    ## 认证
    受保护的接口需要通过 SIWE（Sign-In with Ethereum）登录获取 session token，
    并在请求头中携带：`Authorization: Bearer <siwe-session-token>`

servers:
  - url: http://localhost:3000/api/v1
    description: 本地开发
  - url: https://staging.culturechain.io/api/v1
    description: 测试网
  - url: https://culturechain.io/api/v1
    description: 生产环境

tags:
  - name: works
    description: 作品管理
  - name: shops
    description: 店铺管理
  - name: transactions
    description: 交易记录
  - name: access
    description: 内容访问控制
  - name: search
    description: 搜索
  - name: internal
    description: 内部服务（链上事件同步，不对外暴露）

# ─────────────────────────────────────────────
# 安全方案
# ─────────────────────────────────────────────
components:
  securitySchemes:
    siweAuth:
      type: http
      scheme: bearer
      description: SIWE session token

  # ── 公共响应结构 ──────────────────────────────
  schemas:

    # 通用 Wrapper
    ApiResponse:
      type: object
      properties:
        data:
          description: 业务数据，类型由各接口定义
        error:
          type: string
          nullable: true
          example: null
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 234

    ErrorResponse:
      type: object
      required: [data, error]
      properties:
        data:
          nullable: true
          example: null
        error:
          type: string
          example: "unauthorized"

    # ── 枚举 ──────────────────────────────────────
    WorkCategory:
      type: string
      enum: [painting, book, film, music, other]
      description: 作品分类

    SortOption:
      type: string
      enum: [price_asc, price_desc, newest, popular]
      description: 排序方式

    TransactionType:
      type: string
      enum: [sale, offer_accepted, transfer]

    # ── 领域模型 ─────────────────────────────────
    CreatorSummary:
      type: object
      properties:
        address:
          type: string
          pattern: '^0x[0-9a-fA-F]{40}$'
          example: "0x1234567890abcdef1234567890abcdef12345678"
        shopName:
          type: string
          example: "水墨工坊"
        avatar:
          type: string
          format: uri
          example: "https://ipfs.io/ipfs/QmXxx.../avatar.jpg"

    WorkSummary:
      type: object
      properties:
        tokenId:
          type: string
          example: "42"
        title:
          type: string
          example: "山水之间 No.3"
        category:
          $ref: '#/components/schemas/WorkCategory'
        coverImage:
          type: string
          format: uri
          example: "https://ipfs.io/ipfs/QmXxx.../cover.jpg"
        priceWei:
          type: string
          description: 价格（wei 字符串，避免精度丢失）
          example: "1000000000000000000"
        priceDisplay:
          type: string
          description: 人类可读价格
          example: "1.0 MATIC"
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        supply:
          type: integer
          example: 10
        sold:
          type: integer
          example: 3
        listingId:
          type: string
          example: "88"

    WorkDetail:
      allOf:
        - $ref: '#/components/schemas/WorkSummary'
        - type: object
          properties:
            description:
              type: string
              example: "水墨山水系列第三幅，宣纸水墨，60×90cm"
            metadataURI:
              type: string
              example: "ipfs://QmZzz..."
            contentHash:
              type: string
              example: "sha256:a1b2c3d4..."
            royaltyBps:
              type: integer
              description: 版税率（basis points，500 = 5%）
              example: 500
            license:
              type: string
              example: "CC BY-NC 4.0"
            attributes:
              type: array
              items:
                type: object
                properties:
                  trait_type:
                    type: string
                  value:
                    type: string
              example:
                - trait_type: medium
                  value: 水墨
                - trait_type: dimensions
                  value: 60×90cm
            createdAt:
              type: string
              format: date-time

    Shop:
      type: object
      properties:
        owner:
          type: string
          pattern: '^0x[0-9a-fA-F]{40}$'
          example: "0x1234567890abcdef1234567890abcdef12345678"
        name:
          type: string
          example: "水墨工坊"
        description:
          type: string
          example: "专注水墨山水创作，已发行 30+ 幅原创作品"
        avatar:
          type: string
          format: uri
        banner:
          type: string
          format: uri
        verified:
          type: boolean
          description: 是否为平台认证创作者
          example: false
        stats:
          type: object
          properties:
            totalWorks:
              type: integer
            totalSales:
              type: integer
            totalRevenueWei:
              type: string
        createdAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        txHash:
          type: string
          example: "0xabcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890"
        type:
          $ref: '#/components/schemas/TransactionType'
        tokenId:
          type: string
          example: "42"
        from:
          type: string
          example: "0x1234..."
        to:
          type: string
          example: "0x5678..."
        amount:
          type: integer
          description: 转移数量
          example: 1
        priceWei:
          type: string
          example: "1000000000000000000"
        royaltyWei:
          type: string
          example: "50000000000000000"
        platformFeeWei:
          type: string
          example: "25000000000000000"
        timestamp:
          type: string
          format: date-time

    UploadResult:
      type: object
      properties:
        coverCID:
          type: string
          example: "QmXxx..."
        contentCID:
          type: string
          description: 加密后的内容文件 CID
          example: "QmYyy..."
        contentHash:
          type: string
          description: 原始文件的 SHA-256 哈希，用于链上版权注册
          example: "sha256:a1b2c3..."
        metadataURI:
          type: string
          description: 已构建的 NFT Metadata IPFS URI，直接传给合约 mint 函数
          example: "ipfs://QmZzz..."

    AccessToken:
      type: object
      properties:
        downloadUrl:
          type: string
          format: uri
          description: 有时效的内容下载链接
          example: "https://cdn.culturechain.io/content/42?token=xxx&expires=1710000000"
        expiresAt:
          type: string
          format: date-time
          example: "2024-03-15T11:30:00Z"

  # ── 公共响应 ─────────────────────────────────
  responses:
    Unauthorized:
      description: 未登录或 token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            data: null
            error: "unauthorized"

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            data: null
            error: "not_found"

    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ── 公共参数 ─────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    TokenIdPath:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
      example: "42"

    AddressPath:
      name: address
      in: path
      required: true
      description: 以太坊地址（0x 开头）
      schema:
        type: string
        pattern: '^0x[0-9a-fA-F]{40}$'
      example: "0x1234567890abcdef1234567890abcdef12345678"

# ─────────────────────────────────────────────
# 接口定义
# ─────────────────────────────────────────────
paths:

  # ════════════════════════════════════════════
  # 作品
  # ════════════════════════════════════════════

  /works:
    get:
      tags: [works]
      summary: 获取作品列表
      operationId: listWorks
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/WorkCategory'
        - name: creator
          in: query
          description: 按创作者钱包地址筛选
          schema:
            type: string
            pattern: '^0x[0-9a-fA-F]{40}$'
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/SortOption'
          example: newest
        - name: q
          in: query
          description: 关键词搜索（标题/描述/创作者名）
          schema:
            type: string
      responses:
        '200':
          description: 作品列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkSummary'
                  error:
                    nullable: true
                    example: null
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /works/upload:
    post:
      tags: [works]
      summary: 上传作品文件
      description: |
        上传封面图和正文内容到 IPFS。
        - 封面图明文存储，作为 NFT 预览
        - 正文文件（尤其是视频）将被加密后存储，持有 NFT 的用户才可解密下载
        - 返回的 `metadataURI` 可直接传给链上 `CultureNFT.mint()` 函数
      operationId: uploadWork
      security:
        - siweAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [cover, content, category]
              properties:
                cover:
                  type: string
                  format: binary
                  description: 封面图，max 10MB，支持 jpg/png/webp
                content:
                  type: string
                  format: binary
                  description: 正文文件，max 500MB
                category:
                  $ref: '#/components/schemas/WorkCategory'
                title:
                  type: string
                  description: 作品标题（用于构建 metadata）
                description:
                  type: string
                  description: 作品描述
      responses:
        '200':
          description: 上传成功，返回 IPFS 信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UploadResult'
                  error:
                    nullable: true
                    example: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /works/{tokenId}:
    get:
      tags: [works]
      summary: 获取作品详情
      operationId: getWork
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: 作品详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkDetail'
                  error:
                    nullable: true
                    example: null
        '404':
          $ref: '#/components/responses/NotFound'

  /works/{tokenId}/transactions:
    get:
      tags: [works, transactions]
      summary: 获取作品交易历史
      operationId: getWorkTransactions
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 交易记录列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  error:
                    nullable: true
                    example: null
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/NotFound'

  /works/{tokenId}/access:
    post:
      tags: [works, access]
      summary: 申请内容访问权限
      description: |
        验证调用者是否持有该 tokenId 的 NFT，通过后返回有时效的内容下载链接。

        **验证流程：**
        1. 验证 SIWE session
        2. 链上查询 `balanceOf(userAddress, tokenId) > 0`
        3. 生成有时效签名 URL（默认有效期 1 小时）
      operationId: requestContentAccess
      security:
        - siweAuth: []
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: 授权成功，返回下载链接
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AccessToken'
                  error:
                    nullable: true
                    example: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 未持有该 NFT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                error: "forbidden: caller does not hold this NFT"
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════
  # 店铺
  # ════════════════════════════════════════════

  /shops/{address}:
    get:
      tags: [shops]
      summary: 获取店铺信息
      operationId: getShop
      parameters:
        - $ref: '#/components/parameters/AddressPath'
      responses:
        '200':
          description: 店铺信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Shop'
                  error:
                    nullable: true
                    example: null
        '404':
          $ref: '#/components/responses/NotFound'

  /shops/{address}/works:
    get:
      tags: [shops, works]
      summary: 获取店铺的作品列表
      operationId: getShopWorks
      parameters:
        - $ref: '#/components/parameters/AddressPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/WorkCategory'
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/SortOption'
      responses:
        '200':
          description: 店铺作品列表（格式同 GET /works）
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkSummary'
                  error:
                    nullable: true
                    example: null
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════
  # 搜索
  # ════════════════════════════════════════════

  /search:
    get:
      tags: [search]
      summary: 全文搜索作品
      description: 代理到 Meilisearch，支持跨标题、描述、创作者名称的全文检索。
      operationId: searchWorks
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: 水墨山水
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/WorkCategory'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 搜索结果（格式同 GET /works）
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkSummary'
                  error:
                    nullable: true
                    example: null
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  # ════════════════════════════════════════════
  # 内部接口（链上事件同步）
  # ════════════════════════════════════════════

  /internal/events/work-minted:
    post:
      tags: [internal]
      summary: 同步 WorkMinted 链上事件
      operationId: syncWorkMinted
      description: 由链上事件监听服务调用，将新铸造的作品写入数据库索引。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tokenId, creator, metadataURI, txHash, blockNumber]
              properties:
                tokenId:
                  type: string
                creator:
                  type: string
                metadataURI:
                  type: string
                supply:
                  type: integer
                txHash:
                  type: string
                blockNumber:
                  type: integer
      responses:
        '200':
          description: 同步成功
        '409':
          description: 已存在（幂等处理）

  /internal/events/item-sold:
    post:
      tags: [internal]
      summary: 同步 ItemSold 链上事件
      operationId: syncItemSold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId, tokenId, buyer, priceWei, txHash, blockNumber]
              properties:
                listingId:
                  type: string
                tokenId:
                  type: string
                buyer:
                  type: string
                amount:
                  type: integer
                priceWei:
                  type: string
                royaltyWei:
                  type: string
                platformFeeWei:
                  type: string
                txHash:
                  type: string
                blockNumber:
                  type: integer
      responses:
        '200':
          description: 同步成功
        '409':
          description: 已存在（幂等处理）

  /internal/events/shop-registered:
    post:
      tags: [internal]
      summary: 同步 ShopRegistered 链上事件
      operationId: syncShopRegistered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner, name, txHash, blockNumber]
              properties:
                owner:
                  type: string
                name:
                  type: string
                metadataURI:
                  type: string
                txHash:
                  type: string
                blockNumber:
                  type: integer
      responses:
        '200':
          description: 同步成功
        '409':
          description: 已存在（幂等处理）
