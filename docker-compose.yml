services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: culturechain
      POSTGRES_USER: culturechain
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U culturechain"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.9
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: localdevkey
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
